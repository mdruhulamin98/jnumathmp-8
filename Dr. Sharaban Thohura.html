<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI, sans-serif;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
background:#0f2027;
position:relative;
}
       
    /* profile */
.profile{
width:15vw;
max-width:150px;
height:auto;
border-radius:50%;
border:4px solid white;
margin-bottom:3vh;
box-shadow:0 0 25px rgba(255,255,255,.6);
z-index:1;
position:relative;
}

/* Particle Background */
#particles-js{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* Math Symbols Background */
#math-symbols{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

.symbol{
position:absolute;
color:rgba(255,255,255,0.15);
font-size:30px;
animation:float 15s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) rotate(0deg);}
100%{transform:translateY(-10vh) rotate(360deg);}
}

/* Content */
.content{
position:relative;
z-index:2;
text-align:center;
}

h1{
font-size:4vw;
max-font-size:40px;
margin-bottom:1.5vh;
text-align:center;
text-shadow:0 0 15px rgba(0,0,0,.5);
z-index:1;
position:relative;
}
  /* responsive adjustments */
@media(max-width:768px){
h1{font-size:7vw;}
.folder-container{gap:6vw;}
.folder{padding:5vw;}
.folder i{font-size:10vw;}
.folder p{font-size:4vw;}
.profile{width:25vw;}
}

@media(max-width:480px){
h1{font-size:8vw;}
.folder i{font-size:12vw;}
.folder p{font-size:5vw;}
.profile{width:30vw;}
}  

h2{
color:#00fff5;
margin-bottom:15px;
    font-size:3vw;
max-font-size:28px;
margin-bottom:3vh;
text-align:center;
text-shadow:0 0 10px rgba(0,0,0,.5);
z-index:1;
position:relative;
}

/* Folder */
.folder-container{
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;
}

.folder{
min-width:120px;
padding:30px;
border-radius:20px;
text-align:center;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
transition:0.4s;
}

.folder:hover{
transform:translateY(-15px) scale(1.1);
background:rgba(255,255,255,0.25);
box-shadow:0 0 20px rgba(0,255,245,0.6);
}

.folder i{
font-size:40px;
margin-bottom:10px;
}
    #math-symbols{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

.symbol{
position:absolute;
color:rgba(255,255,255,0.7);
font-size:20px;
animation:floatSymbol linear infinite;
}

@keyframes floatSymbol{
0%{transform:translateY(100vh) rotate(0deg);}
100%{transform:translateY(-10vh) rotate(360deg);}
}

</style>
</head>

    let sym = document.createElement("div");
    sym.className="symbol";
    sym.innerText = symbols[Math.floor(Math.random()*symbols.length)];
    sym.style.left=Math.random()*100+"%";
    sym.style.fontSize=(10+Math.random()*30)+"px";
    sym.style.animationDuration=(10+Math.random()*15)+"s";
    container.appendChild(sym);
}
