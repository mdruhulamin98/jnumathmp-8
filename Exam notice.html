<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>📢 Exam Notice Board</title>

<link rel="icon" type="image/png" sizes="32x32" href="logo.png">
  
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #eef2f5;
  margin: 0;
}

h1 {
  text-align: center;
  background: linear-gradient(45deg,#0ea5e9,#0284c7);
  color: white;
  padding: 15px;
  margin: 0;
}

.container {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  padding: 20px;
}

.column {
  flex: 1 1 45%;
  min-width: 300px;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

@media (max-width: 768px) {
  .column {
    flex: 1 1 100%;
  }
}

h2 {
  text-align: center;
  background: #cbd5e1;
  padding: 8px;
  border-radius: 6px;
  margin-top: 0;
}

.card {
  border-left: 5px solid #0ea5e9;
  background: #f9f9f9;
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 15px;
  transition: 0.2s;
  overflow: hidden;
}

.card:hover {
  transform: scale(1.02);
}

.subject {
  font-weight: bold;
  color: #0284c7;
  margin-bottom: 5px;
}

.topic {
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: break-word;
  font-size: 14px;
  margin-top: 5px;
}

img {
  max-width: 100%;
  height: auto;
  border-radius: 6px;
  margin-top: 8px;
}

.loading {
  text-align: center;
  color: gray;
}

footer {
    text-align: center;
    padding: 12px;
    background: #0284c7;
    color: white;
    font-size: 14px;
    margin-top: 20px;
  }
</style>
</head>

<body>

<h1>📢 Exam Notice Board</h1>

<div class="container">
  <div class="column">
    <h2>1st Mid Exam</h2>
    <div id="firstMid"><p class="loading">Loading...</p></div>
  </div>

  <div class="column">
    <h2>2nd Mid Exam</h2>
    <div id="secondMid"><p class="loading">Loading...</p></div>
  </div>
</div>

<script>
// ==================== UPDATED GOOGLE SHEETS URL ====================
const URL = "https://script.google.com/macros/s/AKfycbzsqrPCMeSLFjWiBq1tRyYkgtWMoTLHsFY-UiGtWObGWWc4bjvYZ2YyHykMSs7QusV1yw/exec";

const CACHE_KEY = "exam_cache_v4";

// 🎨 render function - same design as before
function render(data){
  const first = document.getElementById("firstMid");
  const second = document.getElementById("secondMid");

  first.innerHTML = "";
  second.innerHTML = "";

  if (!data || data.length === 0) {
    first.innerHTML = '<p class="loading">📭 No exam notices found</p>';
    second.innerHTML = '<p class="loading">📭 No exam notices found</p>';
    return;
  }

  data.forEach(item=>{
    let type, subject, date, time, topic, img;
    
    if (Array.isArray(item)) {
      [type, subject, date, time, topic, img] = item;
    } else {
      type = item.type || item[0] || "";
      subject = item.subject || item[1] || "";
      date = item.date || item[2] || "";
      time = item.time || item[3] || "";
      topic = item.topic || item[4] || "";
      img = item.image || item[5] || "";
    }

    let formattedDate = date;
    try {
      if (date && date !== "") {
        const dateObj = new Date(date);
        if (!isNaN(dateObj.getTime())) {
          formattedDate = dateObj.toLocaleDateString("en-GB", {
            day: "2-digit",
            month: "short",
            year: "numeric"
          });
        }
      }
    } catch(e) {
      formattedDate = date;
    }

    const card = `
      <div class="card">
        <div class="subject">📘 ${subject || "Unknown"}</div>
        <div>📅 ${formattedDate || "Date not set"}</div>
        <div>⏰ ${time || "Time not set"}</div>
        <div class="topic">${topic || ""}</div>
        ${img ? `<img src="${img}" loading="lazy">` : ""}
      </div>
    `;

    if(type === "1st" || type === "1st Mid" || type === "1"){
      first.innerHTML += card;
    } else if(type === "2nd" || type === "2nd Mid" || type === "2"){
      second.innerHTML += card;
    }
  });

  if (first.innerHTML === "") first.innerHTML = '<p class="loading">📭 No 1st Mid notices</p>';
  if (second.innerHTML === "") second.innerHTML = '<p class="loading">📭 No 2nd Mid notices</p>';
}

// ⚡ load from cache instantly
function loadCache(){
  const cache = localStorage.getItem(CACHE_KEY);
  if(cache){
    try {
      render(JSON.parse(cache));
      return true;
    } catch(e) {
      return false;
    }
  }
  return false;
}

// 🔄 fetch new data
async function fetchData(){
  try{
    const res = await fetch(URL);
    const data = await res.json();
    
    let examData = [];
    
    if (data.exams && Array.isArray(data.exams)) {
      examData = data.exams;
    } else if (Array.isArray(data)) {
      examData = data;
    } else {
      examData = [];
    }
    
    localStorage.setItem(CACHE_KEY, JSON.stringify(examData));
    render(examData);

  }catch(err){
    console.log("Error:", err);
    if (!loadCache()) {
      const first = document.getElementById("firstMid");
      const second = document.getElementById("secondMid");
      first.innerHTML = '<p class="loading">⚠️ Failed to load data</p>';
      second.innerHTML = '<p class="loading">⚠️ Failed to load data</p>';
    }
  }
}

// 🚀 run
loadCache();     // instant show
fetchData();     // update

// 🔁 auto update every 30 sec
setInterval(fetchData, 30000);
</script>
    
<footer>
  © 2026 Exam Notice System
</footer>
</body>
</html>
