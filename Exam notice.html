<!DOCTYPE html>
<html>
<head>
  <title>Exam Notice Board</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #eef2f5;
    }
    h1 {
      text-align: center;
      background: #0ea5e9;
      color: white;
      padding: 10px;
    }
    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }
    .column {
      width: 48%;
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 5px gray;
      box-sizing: border-box;
      margin-bottom: 20px;
    }
    .card {
      border-left: 5px solid #0ea5e9;
      padding: 10px;
      margin-bottom: 15px;
      background: #f9f9f9;
      border-radius: 8px;
    }
    h2 {
      text-align: center;
      background: #cbd5e1;
      padding: 5px;
      margin-top: 0;
      margin-bottom: 15px;
    }
    h3 {
      color: dodgerblue;
      margin: 0 0 5px 0;
    }
      pre {
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: break-word;
}
    img.exam-image {
      max-width: 120px;
      border-radius: 5px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>📢 Exam Notice Board</h1>

<div class="container">
  <div class="column">
    <h2>1st Mid Exam</h2>
    <div id="firstMid"></div>
  </div>
  <div class="column">
    <h2>2nd Mid Exam</h2>
    <div id="secondMid"></div>
  </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyMD6bS0sCZs1pQdlx679xJscSBm4RuhmMOV7vZ4WW1DvDmxWQ8E25xdRy4TJFITUt7fg/exec";

async function loadData() {
  const res = await fetch(URL);
  const data = await res.json();

  const firstDiv = document.getElementById("firstMid");
  const secondDiv = document.getElementById("secondMid");

  firstDiv.innerHTML = "";
  secondDiv.innerHTML = "";

  data.forEach(item => {
    const [type, subject, date, time, topic, imageUrl] = item;
    const dateObj = new Date(date);
    const formattedDate = dateObj.toLocaleDateString("en-GB", {
      day: "2-digit",
      month: "long",
      year: "numeric"
    });

    const card = `
      <div class="card">
        <h3>📘 ${subject}</h3>
        <p>📅 ${formattedDate}</p>
        <p>⏰ ${time}</p>
        <pre>${topic}</pre>
        ${imageUrl ? `<img class="exam-image" src="${imageUrl}" alt="Exam Image" />` : ""}
      </div>
    `;

    if(type === "1st") {
      firstDiv.innerHTML += card;
    } else {
      secondDiv.innerHTML += card;
    }
  });
}

loadData();
</script>

</body>
</html>
