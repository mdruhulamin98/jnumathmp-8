<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <!-- VERY IMPORTANT for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Exam Notice Board</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #e3f2fd, #f9f9f9);
            margin: 0;
        }

        header {
            background: linear-gradient(45deg, #007bff, #00c6ff);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: 20px auto;
        }
        
        h2 {
            font-size: 25px;
            text-align: center;
            font-weight: bold;
            color: #007bff;
            background-color: powderblue;
        }

        .notice {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 5px solid #007bff;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .notice:hover {
            transform: translateY(-3px);
        }

        .subject {
            font-size: 18px;
            font-weight: bold;
            color: #007bff;
        }

        .date {
            font-size: 13px;
            color: gray;
            margin: 5px 0;
        }

        footer {
            text-align: center;
            padding: 10px;
            background: #007bff;
            color: white;
            font-size: 14px;
        }

        /* 📱 Mobile optimization */
        @media (max-width: 600px) {
            header {
                font-size: 18px;
                padding: 10px;
            }

            .subject {
                font-size: 16px;
            }

            .notice {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

<header>
    📢 Exam Notice Board
</header>

<div class="container">
    <h2> 1st Mid Exam</h2>

    <div class="notice">
        <div class="subject">📘 Fluid Dynamics and heat transfer Exam</div>
        <div class="date">📅 04 April 2026</div>
        <p> Exam Time 09:00 To 10:00 AM.</p>
    </div>

    <div class="notice">
        <div class="subject">📗 Biomathematics Exam</div>
        <div class="date">📅 11 April 2026</div>
        <p>Exam Time 11:00 To 12:00 AM.</p>
    </div>
    

<footer>
    © 2026 Exam Notice System
</footer>

</body>
</html>
