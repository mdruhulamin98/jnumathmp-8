<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>📢 Exam Notice Board</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #eef2f5;
  margin: 0;
}

h1 {
  text-align: center;
  background: linear-gradient(45deg,#0ea5e9,#0284c7);
  color: white;
  padding: 15px;
  margin: 0;
}

.container {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  padding: 20px;
}

.column {
  flex: 1 1 45%;
  min-width: 300px;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

@media (max-width: 768px) {
  .column {
    flex: 1 1 100%;
  }
}

h2 {
  text-align: center;
  background: #cbd5e1;
  padding: 8px;
  border-radius: 6px;
  margin-top: 0;
}

.card {
  border-left: 5px solid #0ea5e9;
  background: #f9f9f9;
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 15px;
  transition: 0.2s;
  overflow: hidden;
}

.card:hover {
  transform: scale(1.02);
}

.subject {
  font-weight: bold;
  color: #0284c7;
  margin-bottom: 5px;
}

.topic {
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: break-word;
  font-size: 14px;
  margin-top: 5px;
}

img {
  max-width: 100%;
  height: auto;
  border-radius: 6px;
  margin-top: 8px;
}

.loading {
  text-align: center;
  color: gray;
}

footer {
    text-align: center;
    padding: 12px;
    background: #0284c7;
    color: white;
    font-size: 14px;
    margin-top: 20px;
  }
</style>
</head>

<body>

<h1>📢 Exam Notice Board</h1>

<div class="container">
  <div class="column">
    <h2>1st Mid Exam</h2>
    <div id="firstMid"><p class="loading">Loading...</p></div>
  </div>

  <div class="column">
    <h2>2nd Mid Exam</h2>
    <div id="secondMid"><p class="loading">Loading...</p></div>
  </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyMD6bS0sCZs1pQdlx679xJscSBm4RuhmMOV7vZ4WW1DvDmxWQ8E25xdRy4TJFITUt7fg/exec";

const CACHE_KEY = "exam_cache_v3";

// 🎨 render function
function render(data){
  const first = document.getElementById("firstMid");
  const second = document.getElementById("secondMid");

  first.innerHTML = "";
  second.innerHTML = "";

  data.forEach(item=>{
    const [type, subject, date, time, topic, img] = item;

    const formattedDate = new Date(date).toLocaleDateString("en-GB", {
      day: "2-digit",
      month: "short",
      year: "numeric"
    });

    const card = `
      <div class="card">
        <div class="subject">📘 ${subject}</div>
        <div>📅 ${formattedDate}</div>
        <div>⏰ ${time}</div>
        <div class="topic">${topic}</div>
        ${img ? `<img src="${img}" loading="lazy">` : ""}
      </div>
    `;

    if(type === "1st"){
      first.innerHTML += card;
    } else {
      second.innerHTML += card;
    }
  });
}

// ⚡ load from cache instantly
function loadCache(){
  const cache = localStorage.getItem(CACHE_KEY);
  if(cache){
    render(JSON.parse(cache));
  }
}

// 🔄 fetch new data
async function fetchData(){
  try{
    const res = await fetch(URL);
    const data = await res.json();

    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    render(data);

  }catch(err){
    console.log("Error:", err);
  }
}

// 🚀 run
loadCache();     // instant show
fetchData();     // update

// 🔁 auto update every 30 sec
setInterval(fetchData, 30000);
</script>
    
<footer>
  © 2026 Exam Notice System  
</footer>
</body>
</html>
